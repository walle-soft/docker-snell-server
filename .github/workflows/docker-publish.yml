name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      snell_version:
        description: 'Snell server version (e.g. v5.0.1)'
        required: false
        default: 'v5.0.1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 决定要打包的 Snell 版本:
      #   - 手动触发(workflow_dispatch):用输入的 snell_version
      #   - 推 git tag(如 v6.0.0rc):用 tag 名,tag 名即 Snell 版本
      #   - 推分支:用默认稳定版
      - name: Resolve Snell version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.snell_version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            V="${{ github.ref_name }}"
          else
            V="v5.0.1"
          fi
          echo "snell_version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved Snell version: $V"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest 只跟随默认分支(稳定版);tag 事件按原始 tag 名打镜像标签,
          # 因此 v6.0.0rc 这类预览版会得到独立的 :v6.0.0rc 标签,且不会覆盖 :latest
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SNELL_VERSION=${{ steps.ver.outputs.snell_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
